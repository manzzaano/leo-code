name: Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: python -m pytest --tb=short -q

      - name: Import smoke test
        run: |
          python -c "from leo_code.core.parser import Capsule, extract_from_file"
          python -c "from leo_code.rag.classifier import classify_task"
          python -c "from leo_code.rag.compressor import compress"
          python -c "from leo_code.rag.llm import get_provider"
          python -c "from leo_code.sdk import KCRAGClient"
